<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中1数学：作図の原理 ARシミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'sans-serif'; background: #000; }
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }
        #canvas-overlay { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 1rem; }
        .control-panel { bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; }
        .info-panel { top: 20px; left: 20px; width: calc(100% - 40px); max-width: 350px; }
        #error-msg { display: none; background: rgba(255, 0, 0, 0.8); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .dot { width: 24px; height: 24px; background: white; border: 4px solid #3b82f6; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); cursor: move; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; z-index: 100; text-align: center; }
        
        /* 撮影時のフラッシュアニメーション */
        .flash { animation: flash-anim 0.2s ease-out; }
        @keyframes flash-anim {
            0% { opacity: 0; background: white; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="loading">カメラを起動中...<br>(カメラ不可の場合は自動でシミュレーターに切り替わります)</div>

<div id="video-container">
    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="canvas-overlay"></canvas>
    <div id="ui-dots">
        <div id="center-a" class="dot interactive" style="top: 40%; left: 35%;"></div>
        <div id="center-b" class="dot interactive" style="top: 40%; left: 65%;"></div>
    </div>
</div>

<div id="ui-layer">
    <div class="info-panel glass p-4 absolute interactive">
        <h1 class="font-bold text-lg text-blue-800 mb-1">作図の仕組みを調べよう</h1>
        <p id="description" class="text-sm text-gray-700 leading-tight">
            2つの円を動かして、四角形の形や線の交わり方を観察しよう。
        </p>
        <div id="shape-status" class="mt-2 p-2 bg-blue-100 rounded text-xs font-mono"></div>
    </div>

    <div class="control-panel glass p-5 absolute interactive shadow-2xl">
        <div id="error-msg" class="text-xs"></div>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <div class="flex justify-between text-[10px] mb-1">
                    <span class="font-bold text-blue-600">半径1 (A)</span>
                    <span id="val-r1">120</span>
                </div>
                <input type="range" id="range-r1" min="20" max="300" value="120" class="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer">
            </div>
            <div>
                <div class="flex justify-between text-[10px] mb-1">
                    <span class="font-bold text-red-600">半径2 (B)</span>
                    <span id="val-r2">120</span>
                </div>
                <input type="range" id="range-r2" min="20" max="300" value="120" class="w-full h-2 bg-red-200 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
            <button id="toggle-quad" class="bg-purple-600 text-white text-[10px] py-2 rounded font-bold hover:bg-purple-700 transition">四角形 表示/非表示</button>
            <button id="capture-btn" class="bg-blue-600 text-white text-[10px] py-2 rounded font-bold hover:bg-blue-700 transition flex items-center justify-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                撮影
            </button>
            <button id="reset-pos" class="bg-gray-200 text-gray-800 text-[10px] py-2 rounded font-bold hover:bg-gray-300 transition">位置リセット</button>
        </div>
        <div class="text-[9px] text-center mt-2 text-gray-500 italic">撮影した写真はブラウザのダウンロードフォルダに保存されます</div>
    </div>
</div>

<!-- 撮影用の隠しキャンバス -->
<canvas id="capture-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('canvas-overlay');
    const ctx = canvas.getContext('2d');
    const errorMsg = document.getElementById('error-msg');
    const loading = document.getElementById('loading');
    const centerA = document.getElementById('center-a');
    const centerB = document.getElementById('center-b');
    const shapeStatus = document.getElementById('shape-status');

    let state = {
        p1: { x: window.innerWidth * 0.35, y: window.innerHeight * 0.4 },
        p2: { x: window.innerWidth * 0.65, y: window.innerHeight * 0.4 },
        r1: 120,
        r2: 120,
        showQuad: true,
        isCameraOn: false
    };

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            video.srcObject = stream;
            state.isCameraOn = true;
            loading.style.display = 'none';
        } catch (err) {
            console.error("Camera error: ", err);
            errorMsg.textContent = "カメラを使用できません。シミュレーターモードで作動中。";
            errorMsg.style.display = "block";
            loading.style.display = 'none';
            video.style.background = "linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px)";
            video.style.backgroundColor = "#f9fafb";
            video.style.backgroundSize = "20px 20px";
        }
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        updateUI();
    }

    function setupDraggable(el, key) {
        let isDragging = false;
        const start = (e) => { isDragging = true; e.preventDefault(); };
        const end = () => isDragging = false;
        const move = (e) => {
            if (!isDragging) return;
            const touch = e.touches ? e.touches[0] : e;
            state[key].x = touch.clientX;
            state[key].y = touch.clientY;
            updateUI();
        };
        el.addEventListener('mousedown', start);
        el.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', end);
        window.addEventListener('touchend', end);
    }

    function getIntersections(x0, y0, r0, x1, y1, r1) {
        let dx = x1 - x0;
        let dy = y1 - y0;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d > r0 + r1 || d < Math.abs(r0 - r1) || d === 0) return null;
        let a = (r0 * r0 - r1 * r1 + d * d) / (2 * d);
        let h = Math.sqrt(Math.max(0, r0 * r0 - a * a));
        let x2 = x0 + a * (x1 - x0) / d;
        let y2 = y0 + a * (y1 - y0) / d;
        return [
            { x: x2 + h * (y1 - y0) / d, y: y2 - h * (x1 - x0) / d },
            { x: x2 - h * (y1 - y0) / d, y: y2 + h * (x1 - x0) / d }
        ];
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const { p1, p2, r1, r2, showQuad } = state;

        // 円1 (A)
        ctx.beginPath();
        ctx.arc(p1.x, p1.y, r1, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.7)';
        ctx.lineWidth = 4;
        ctx.stroke();

        // 円2 (B)
        ctx.beginPath();
        ctx.arc(p2.x, p2.y, r2, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(239, 68, 68, 0.7)';
        ctx.lineWidth = 4;
        ctx.stroke();

        const intersects = getIntersections(p1.x, p1.y, r1, p2.x, p2.y, r2);

        if (intersects) {
            const [i1, i2] = intersects;

            if (showQuad) {
                // 四角形描画
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(i1.x, i1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(i2.x, i2.y);
                ctx.closePath();
                ctx.fillStyle = 'rgba(139, 92, 246, 0.25)';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#4b5563';
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 垂直二等分線 (PQ)
            ctx.beginPath();
            ctx.moveTo(i1.x, i1.y);
            ctx.lineTo(i2.x, i2.y);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 5;
            ctx.stroke();

            // 線分AB
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = '#f59e0b';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 交点ラベル
            [i1, i2].forEach((p, idx) => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#10b981';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 1;
                ctx.font = 'bold 18px sans-serif';
                ctx.strokeText(idx === 0 ? 'P' : 'Q', p.x + 12, p.y - 12);
                ctx.fillText(idx === 0 ? 'P' : 'Q', p.x + 12, p.y - 12);
            });

            let type = r1 === r2 ? "ひし形" : "たこ形";
            shapeStatus.innerHTML = `<span class="font-bold text-purple-700">${type}</span>の性質：<br>` +
                                   `AP=AQ=${r1}, BP=BQ=${r2}<br>` +
                                   `<span class="text-green-700">PQ ⊥ AB (垂直に交わる)</span>`;
        } else {
            shapeStatus.innerHTML = "<span class='text-red-500'>円を近づけるか、<br>半径を大きくしてね。</span>";
        }
        requestAnimationFrame(draw);
    }

    function updateUI() {
        centerA.style.left = state.p1.x + 'px';
        centerA.style.top = state.p1.y + 'px';
        centerB.style.left = state.p2.x + 'px';
        centerB.style.top = state.p2.y + 'px';
        document.getElementById('val-r1').textContent = state.r1;
        document.getElementById('val-r2').textContent = state.r2;
    }

    // 写真撮影機能
    function takeSnapshot() {
        const captureCanvas = document.getElementById('capture-canvas');
        const capCtx = captureCanvas.getContext('2d');
        
        captureCanvas.width = canvas.width;
        captureCanvas.height = canvas.height;

        // 1. ビデオを描画 (カメラがオンの場合)
        if (state.isCameraOn) {
            capCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
        } else {
            // シミュレーターモードの背景
            capCtx.fillStyle = "#f9fafb";
            capCtx.fillRect(0, 0, captureCanvas.width, captureCanvas.height);
            capCtx.strokeStyle = "#e5e7eb";
            for(let i=0; i<captureCanvas.width; i+=20) {
                capCtx.beginPath(); capCtx.moveTo(i,0); capCtx.lineTo(i, captureCanvas.height); capCtx.stroke();
            }
            for(let i=0; i<captureCanvas.height; i+=20) {
                capCtx.beginPath(); capCtx.moveTo(0,i); capCtx.lineTo(captureCanvas.width, i); capCtx.stroke();
            }
        }

        // 2. 作図キャンバスを重ねる
        capCtx.drawImage(canvas, 0, 0);

        // 3. ダウンロード
        const dataUrl = captureCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `math-construction-${Date.now()}.png`;
        link.href = dataUrl;
        link.click();

        // 視覚的フィードバック (フラッシュ)
        document.body.classList.add('flash');
        setTimeout(() => document.body.classList.remove('flash'), 200);
    }

    // イベント
    document.getElementById('range-r1').addEventListener('input', (e) => {
        state.r1 = parseInt(e.target.value);
        updateUI();
    });
    document.getElementById('range-r2').addEventListener('input', (e) => {
        state.r2 = parseInt(e.target.value);
        updateUI();
    });
    document.getElementById('toggle-quad').addEventListener('click', () => {
        state.showQuad = !state.showQuad;
    });
    document.getElementById('capture-btn').addEventListener('click', takeSnapshot);
    document.getElementById('reset-pos').addEventListener('click', () => {
        state.p1 = { x: window.innerWidth * 0.35, y: window.innerHeight * 0.4 };
        state.p2 = { x: window.innerWidth * 0.65, y: window.innerHeight * 0.4 };
        updateUI();
    });

    window.addEventListener('resize', resize);
    window.onload = () => {
        initCamera();
        resize();
        setupDraggable(centerA, 'p1');
        setupDraggable(centerB, 'p2');
        draw();
    };
</script>
</body>
</html>
